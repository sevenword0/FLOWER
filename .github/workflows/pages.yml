name: Deploy to GitHub Pages

# Publishes the repository root (index.html = the WebGPU flower app) to GitHub Pages.
# Runs on every push to main, and can be triggered manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to enable Pages and publish the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages for this repo if it isn't enabled yet.
          enablement: true

      - name: Upload artifact (repository root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
